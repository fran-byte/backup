services:
  backend:
    container_name: blackjack-backend
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
    command: sh -c "npm install && npm run dev"

  frontend:
    container_name: blackjack-frontend
    build: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  nginx:
    container_name: blackjack-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./requirements/nginx/conf.d/blackjack.conf:/etc/nginx/conf.d/blackjack.conf
      - ./secrets/certs/blackjack.local.crt:/etc/ssl/certs/blackjack.local.crt
      - ./secrets/certs/blackjack.local.key:/etc/ssl/private/blackjack.local.key
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:15-alpine
    container_name: blackjack-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql